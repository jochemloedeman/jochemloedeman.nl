<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JOCHEM LOEDEMAN</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- Start - Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <!-- <link href="styles/lightbox.min.css" rel="stylesheet" /> --> <!-- Lightbox CSS removed -->
    <!-- End - Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            content: ["./*.{html,js}"],
            theme: {
                extend:
                {
                    fontFamily: {
                        'roboto': ['Playfair Display', 'serif'],
                        'merriweather': ['Merriweather', 'serif'],
                        'open-sans': ['Open Sans', 'sans-serif'],
                        'montserrat': ['Montserrat', 'sans-serif'],
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    screens: {
                        'xs': '540px',
                    }
                }
            },
            plugins: [],
        }
    </script>
</head>

<body class="bg-white h-screen text-black opacity-0 transition ease-in duration-700 mx-auto w-11/12">
    <jl-navbar></jl-navbar>
    <!-- Content -->
    <main class="flex flex-col md:flex-row flex-grow items-center justify-center gap-y-8 gap-x-8 xl:gap-x-16 px-4 py-8">
        <a href="/urban" class="relative group w-4/5 sm:w-3/5 xl:w-2/5 overflow-hidden">
            <img src="images/home/urban_representative.jpg" alt="Urban Photography" class="w-full object-cover transition-opacity duration-300 group-hover:opacity-80 max-h-[70vh] rounded-lg">
            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-black bg-opacity-25 group-hover:bg-opacity-40 rounded-lg">
                <span class="text-white text-3xl sm:text-4xl lg:text-5xl font-poppins font-semibold tracking-wider">URBAN</span>
            </div>
        </a>
        <a href="/nature" class="relative group w-4/5 sm:w-3/5 xl:w-2/5 overflow-hidden">
            <img src="images/home/nature_representative.jpg" alt="Nature Photography" class="w-full object-cover transition-opacity duration-300 group-hover:opacity-80 max-h-[70vh] rounded-lg">
            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 bg-black bg-opacity-25 group-hover:bg-opacity-40 rounded-lg">
                <span class="text-white text-3xl sm:text-4xl lg:text-5xl font-poppins font-semibold tracking-wider">NATURE</span>
            </div>
        </a>
    </main>

    <jl-footer></jl-footer>
    <script src="scripts/jl-components.js"></script>
    <script src="scripts/fade_in.js"></script>
</body>

</html>
